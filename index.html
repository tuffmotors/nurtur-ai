<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Childcare SaaS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #2563eb;
      --brand-soft: #dbeafe;
      --danger: #b91c1c;
      --radius: 14px;
      --shadow: 0 12px 28px rgba(17, 24, 39, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Nunito", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .shell {
      min-height: 100vh;
      max-width: 1000px;
      margin: 0 auto;
      padding: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .header {
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .brand-block h1 {
      font-size: 1.15rem;
      margin: 0;
    }

    .brand-block p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .badge {
      background: var(--brand-soft);
      color: var(--brand);
      font-weight: 800;
      font-size: 0.78rem;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .route-help {
      padding: 24px;
      line-height: 1.55;
    }

    .chat {
      max-width: 640px;
      margin: 0 auto;
      overflow: hidden;
    }

    .chat-body {
      padding: 14px;
      min-height: 420px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fbfdff;
    }

    .msg {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
    }

    .msg.ai {
      background: #fff;
      align-self: flex-start;
    }

    .msg.user {
      background: #eff6ff;
      border-color: #bfdbfe;
      align-self: flex-end;
    }

    .chat-input {
      padding: 12px;
      border-top: 1px solid var(--line);
      display: flex;
      gap: 8px;
      background: #fff;
    }

    input, textarea, button {
      font: inherit;
    }

    .chat-input input {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      outline: none;
    }

    .btn {
      border: 0;
      background: var(--brand);
      color: #fff;
      font-weight: 800;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
    }

    .admin-wrap {
      padding: 14px;
    }

    .admin-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .lead-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }

    .lead {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }

    .lead p {
      margin: 4px 0;
      font-size: 0.9rem;
    }

    .muted { color: var(--muted); }
    .danger { color: var(--danger); }
  </style>
</head>
<body>
  <main id="app" class="shell"></main>

  <script>
    const DEFAULTS = {
      brandColor: "#2563eb",
      tagline: "Trusted childcare enquiries",
      contactEmail: "hello@centre.com",
      contactPhone: "",
      logoText: ""
    };

    const QUESTIONS = [
      "How old is your child?",
      "What is the parent/guardian full name?",
      "What is your best phone number?",
      "Please share your enquiry details (days needed, start timing, or anything important)."
    ];

    const app = document.getElementById("app");

    function titleCase(slug) {
      return slug
        .split("-")
        .filter(Boolean)
        .map((part) => part[0].toUpperCase() + part.slice(1))
        .join(" ");
    }

    function parseRoute(pathname) {
      const parts = pathname.replace(/^\/+|\/+$/g, "").split("/").filter(Boolean);
      if (parts.length !== 2) return null;
      const [centreId, view] = parts;
      if (!/^[a-z0-9-]{2,}$/i.test(centreId)) return null;
      if (view !== "chat" && view !== "admin") return null;
      return { centreId: centreId.toLowerCase(), view };
    }

    function leadKey(centreId) {
      return `cc-saas-leads-${centreId}`;
    }

    function settingsKey(centreId) {
      return `cc-saas-settings-${centreId}`;
    }

    function getSettings(centreId) {
      try {
        const raw = localStorage.getItem(settingsKey(centreId));
        if (!raw) return { ...DEFAULTS };
        const parsed = JSON.parse(raw);
        return { ...DEFAULTS, ...parsed };
      } catch (_error) {
        return { ...DEFAULTS };
      }
    }

    function getCentreDisplayName(centreId, settings) {
      return settings.centreName && settings.centreName.trim()
        ? settings.centreName.trim()
        : `${titleCase(centreId)} Childcare`;
    }

    function getLeads(centreId) {
      try {
        const raw = localStorage.getItem(leadKey(centreId));
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (_error) {
        return [];
      }
    }

    function saveLeads(centreId, leads) {
      localStorage.setItem(leadKey(centreId), JSON.stringify(leads));
    }

    function validPhone(value) {
      return /(?:\+?\d[\d\s()-]{7,}\d)/.test(value.trim());
    }

    function renderShellHeader(centreId, centreName, view) {
      const header = document.createElement("section");
      header.className = "header card";
      header.innerHTML = `
        <div class="brand-block">
          <h1>${centreName}</h1>
          <p>${view === "chat" ? "Parent Enquiry Chat" : "Lead Dashboard"} • Centre: ${centreId}</p>
        </div>
        <div class="badge">${view.toUpperCase()}</div>
      `;
      return header;
    }

    function renderRouteHelp() {
      app.innerHTML = `
        <section class="card route-help">
          <h2>Route required</h2>
          <p>Use one of these paths:</p>
          <p><b>/[centreId]/chat</b> for parent chatbot</p>
          <p><b>/[centreId]/admin</b> for lead dashboard</p>
          <p class="muted">Example: <code>/sunrise-centre/chat</code> or <code>/sunrise-centre/admin</code></p>
        </section>
      `;
    }

    function renderChat(route, settings) {
      const centreName = getCentreDisplayName(route.centreId, settings);
      document.documentElement.style.setProperty("--brand", settings.brandColor || DEFAULTS.brandColor);

      app.innerHTML = "";
      app.appendChild(renderShellHeader(route.centreId, centreName, "chat"));

      const chat = document.createElement("section");
      chat.className = "card chat";
      chat.innerHTML = `
        <div id="chatBody" class="chat-body"></div>
        <form id="chatForm" class="chat-input">
          <input id="chatInput" placeholder="Type your answer..." autocomplete="off" />
          <button class="btn" type="submit">Send</button>
        </form>
      `;
      app.appendChild(chat);

      const chatBody = document.getElementById("chatBody");
      const chatForm = document.getElementById("chatForm");
      const chatInput = document.getElementById("chatInput");

      const state = {
        step: 0,
        lead: { childAge: "", parentName: "", phone: "", enquiryDetails: "" }
      };

      function addMessage(text, role) {
        const node = document.createElement("div");
        node.className = `msg ${role}`;
        node.textContent = text;
        chatBody.appendChild(node);
        chatBody.scrollTop = chatBody.scrollHeight;
      }

      function askCurrent() {
        addMessage(QUESTIONS[state.step], "ai");
      }

      function validateAndStore(raw) {
        const value = raw.trim();
        if (!value) return { ok: false, error: "Please enter a response." };

        if (state.step === 0) {
          if (!/\d/.test(value)) return { ok: false, error: "Please enter a valid child age." };
          state.lead.childAge = value;
          return { ok: true };
        }
        if (state.step === 1) {
          if (value.length < 3) return { ok: false, error: "Please enter full parent name." };
          state.lead.parentName = value;
          return { ok: true };
        }
        if (state.step === 2) {
          if (!validPhone(value)) return { ok: false, error: "Please enter a valid phone number." };
          state.lead.phone = value;
          return { ok: true };
        }
        if (state.step === 3) {
          if (value.length < 8) return { ok: false, error: "Please add enquiry details." };
          state.lead.enquiryDetails = value;
          return { ok: true };
        }
        return { ok: false, error: "Unexpected step." };
      }

      function submitLead() {
        const leads = getLeads(route.centreId);
        leads.unshift({
          id: `lead-${Date.now()}`,
          ...state.lead,
          createdAt: new Date().toISOString()
        });
        saveLeads(route.centreId, leads);
      }

      function restart() {
        state.step = 0;
        state.lead = { childAge: "", parentName: "", phone: "", enquiryDetails: "" };
        askCurrent();
      }

      addMessage(`Hi! Welcome to ${centreName}. ${settings.tagline}`, "ai");
      askCurrent();

      chatForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const value = chatInput.value.trim();
        if (!value) return;
        addMessage(value, "user");
        chatInput.value = "";

        const result = validateAndStore(value);
        if (!result.ok) {
          addMessage(result.error, "ai");
          return;
        }

        state.step += 1;
        if (state.step < QUESTIONS.length) {
          askCurrent();
        } else {
          submitLead();
          addMessage("Thanks — your enquiry was submitted successfully. Our team will contact you shortly.", "ai");
          restart();
        }
      });
    }

    function renderAdmin(route, settings) {
      const centreName = getCentreDisplayName(route.centreId, settings);
      document.documentElement.style.setProperty("--brand", settings.brandColor || DEFAULTS.brandColor);

      app.innerHTML = "";
      app.appendChild(renderShellHeader(route.centreId, centreName, "admin"));

      const section = document.createElement("section");
      section.className = "card admin-wrap";
      section.innerHTML = `
        <div class="admin-top">
          <div>
            <b id="leadCount">0 leads</b>
            <div class="muted">Centre-specific dashboard</div>
          </div>
          <button id="clearLeads" class="btn">Clear Leads</button>
        </div>
        <div id="leadsList" class="lead-grid"></div>
      `;
      app.appendChild(section);

      const leadCount = document.getElementById("leadCount");
      const leadsList = document.getElementById("leadsList");
      const clearLeads = document.getElementById("clearLeads");

      function renderLeads() {
        const leads = getLeads(route.centreId);
        leadCount.textContent = `${leads.length} lead${leads.length === 1 ? "" : "s"}`;
        leadsList.innerHTML = "";

        if (!leads.length) {
          leadsList.innerHTML = '<div class="lead"><p class="muted">No leads captured yet.</p></div>';
          return;
        }

        leads.forEach((lead) => {
          const card = document.createElement("article");
          card.className = "lead";
          card.innerHTML = `
            <p><b>Child Age:</b> ${lead.childAge}</p>
            <p><b>Parent Name:</b> ${lead.parentName}</p>
            <p><b>Phone:</b> ${lead.phone}</p>
            <p><b>Enquiry:</b> ${lead.enquiryDetails}</p>
            <p class="muted"><b>Submitted:</b> ${new Date(lead.createdAt).toLocaleString()}</p>
          `;
          leadsList.appendChild(card);
        });
      }

      clearLeads.addEventListener("click", () => {
        const ok = window.confirm("Clear all leads for this centre?");
        if (!ok) return;
        saveLeads(route.centreId, []);
        renderLeads();
      });

      renderLeads();
    }

    function boot() {
      const route = parseRoute(window.location.pathname);
      if (!route) {
        renderRouteHelp();
        return;
      }
      const settings = getSettings(route.centreId);
      if (route.view === "chat") renderChat(route, settings);
      if (route.view === "admin") renderAdmin(route, settings);
    }

    boot();
  </script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Childcare AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f6f0;
      --bg-soft: #fdfcf8;
      --cream: #fff9ee;
      --sage: #dce9de;
      --sage-strong: #9cb89f;
      --sun: #ffcb61;
      --sun-deep: #f8a93a;
      --text: #304139;
      --muted: #6d7f75;
      --white: #ffffff;
      --card-shadow: 0 18px 35px rgba(70, 92, 75, 0.12);
      --soft-shadow: 0 10px 25px rgba(55, 74, 60, 0.1);
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --spring: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Nunito", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, #ffffff 0%, transparent 35%),
        radial-gradient(circle at 85% 10%, #edf5ee 0%, transparent 40%),
        linear-gradient(145deg, var(--bg-soft), var(--bg));
      min-height: 100vh;
      overflow-x: hidden;
      padding: 26px 18px 36px;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
    }

    .hero {
      background: linear-gradient(130deg, #fffdf7, #f4f8f2);
      border-radius: 28px;
      box-shadow: var(--card-shadow);
      padding: 26px 22px;
      margin-bottom: 24px;
      border: 1px solid rgba(172, 197, 176, 0.22);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .logo {
      width: 62px;
      height: 62px;
      flex: 0 0 62px;
      border-radius: 18px;
      background: linear-gradient(150deg, #fff3cf, #fffdf8);
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 1px rgba(255, 171, 44, 0.2), 0 8px 20px rgba(255, 183, 84, 0.28);
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.15rem, 2.7vw, 1.6rem);
      line-height: 1.1;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-weight: 600;
    }

    .lead-counter {
      background: var(--white);
      border: 1px solid rgba(160, 187, 166, 0.3);
      box-shadow: var(--soft-shadow);
      padding: 12px 18px;
      border-radius: 14px;
      text-align: center;
      min-width: 160px;
    }

    .lead-counter strong {
      font-size: 1.45rem;
      display: block;
      color: #2f5a3f;
      line-height: 1;
    }

    .lead-counter span {
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .contact-strip {
      width: 100%;
      margin-top: 6px;
      background: #fff;
      border: 1px solid rgba(171, 197, 176, 0.28);
      border-radius: 12px;
      padding: 8px 12px;
      color: #5c7867;
      font-size: 0.83rem;
      font-weight: 700;
    }

    .admin-panel {
      background: linear-gradient(150deg, #fffeff, #f6fbf7);
      border-radius: 24px;
      border: 1px solid rgba(169, 194, 173, 0.25);
      box-shadow: var(--card-shadow);
      padding: 20px;
    }

    .admin-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .admin-top h2 {
      margin: 0;
      font-size: 1.12rem;
    }

    .settings-panel {
      margin-bottom: 14px;
      border: 1px solid rgba(170, 197, 176, 0.35);
      border-radius: 14px;
      background: linear-gradient(145deg, #ffffff, #f5faf6);
      overflow: hidden;
    }

    .settings-panel summary {
      cursor: pointer;
      list-style: none;
      padding: 12px 14px;
      font-weight: 800;
      color: #365743;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .settings-panel summary::-webkit-details-marker {
      display: none;
    }

    .settings-body {
      border-top: 1px solid rgba(170, 197, 176, 0.25);
      padding: 12px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    }

    .settings-field {
      display: grid;
      gap: 4px;
      font-size: 0.82rem;
      color: #587362;
      font-weight: 700;
    }

    .settings-field input {
      border: 1px solid rgba(159, 187, 165, 0.45);
      border-radius: 10px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 0.88rem;
      color: #2f4f3f;
      background: #fff;
    }

    .settings-actions {
      grid-column: 1 / -1;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .logo-custom {
      width: 46px;
      height: 46px;
      object-fit: cover;
      border-radius: 12px;
      display: none;
      box-shadow: 0 5px 12px rgba(86, 112, 95, 0.2);
    }

    .admin-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .lead-toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
    }

    .toolbar-meta {
      margin-left: auto;
      color: #5f7c6a;
      font-size: 0.84rem;
      font-weight: 700;
    }

    .toolbar-input,
    .toolbar-select {
      border: 1px solid rgba(162, 188, 167, 0.45);
      border-radius: 12px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 0.9rem;
      color: #345242;
      background: #fff;
      min-width: 190px;
    }

    .btn {
      border: 0;
      background: linear-gradient(140deg, #95b89a, #7ea885);
      color: #fff;
      font-weight: 800;
      border-radius: 12px;
      padding: 10px 14px;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(82, 120, 91, 0.28);
      transition: transform 0.25s var(--spring), box-shadow 0.25s var(--spring);
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 12px 20px rgba(82, 120, 91, 0.35);
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-secondary {
      background: linear-gradient(140deg, #dfe8e1, #cad9cc);
      color: #365543;
      box-shadow: 0 8px 16px rgba(113, 141, 123, 0.2);
    }

    .btn-danger {
      background: linear-gradient(145deg, #f0b8a9, #e59a89);
      color: #fff;
      box-shadow: 0 8px 16px rgba(170, 103, 83, 0.28);
    }

    .leads-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 14px;
    }

    .lead-card {
      border-radius: 17px;
      background: linear-gradient(145deg, #ffffff, #f3f8f4);
      border: 1px solid rgba(179, 202, 183, 0.28);
      box-shadow: var(--soft-shadow);
      padding: 14px;
      position: relative;
      overflow: hidden;
      animation: popIn 0.55s var(--spring);
    }

    .lead-card h3 {
      margin: 0 0 8px;
      font-size: 1.05rem;
      color: #365743;
    }

    .lead-row {
      font-size: 0.92rem;
      margin: 4px 0;
      color: #4c6455;
    }

    .lead-row b {
      color: #335143;
    }

    .lead-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .lead-btn {
      border: 1px solid rgba(140, 170, 149, 0.5);
      background: #f5faf6;
      color: #2f4c3d;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 0.78rem;
      font-weight: 800;
      cursor: pointer;
    }

    .lead-btn.delete {
      border-color: rgba(184, 119, 100, 0.45);
      background: #fff4f1;
      color: #9d4c3a;
    }

    .lead-edit {
      margin-top: 8px;
      display: grid;
      gap: 8px;
    }

    .lead-edit input {
      border: 1px solid rgba(158, 187, 164, 0.45);
      border-radius: 10px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 0.88rem;
    }

    .badge {
      position: absolute;
      right: 12px;
      top: 12px;
      background: linear-gradient(140deg, #fff1b4, #ffd56a);
      color: #7d4f02;
      font-size: 0.72rem;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 800;
      letter-spacing: 0.02em;
      animation: pulseBadge 1.2s ease-in-out infinite;
      box-shadow: 0 5px 12px rgba(255, 177, 38, 0.32);
    }

    .empty-state {
      text-align: center;
      background: #fff;
      border-radius: 16px;
      border: 1px dashed rgba(144, 174, 151, 0.4);
      color: #75907f;
      padding: 18px;
      font-weight: 600;
    }

    .pagination {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .page-text {
      color: #5d7969;
      font-size: 0.84rem;
      font-weight: 700;
      min-width: 110px;
      text-align: center;
    }

    .timeline-panel {
      margin-top: 18px;
      border-radius: 16px;
      border: 1px solid rgba(170, 196, 174, 0.3);
      background: linear-gradient(145deg, #ffffff, #f4f8f5);
      padding: 12px;
    }

    .timeline-panel h3 {
      margin: 0 0 10px;
      font-size: 0.96rem;
      color: #365743;
    }

    .timeline-list {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow-y: auto;
    }

    .timeline-item {
      border-radius: 10px;
      background: #fff;
      border: 1px solid rgba(177, 200, 182, 0.32);
      padding: 8px 10px;
      font-size: 0.83rem;
      color: #4f6b5a;
      line-height: 1.35;
    }

    .chat-launcher {
      position: fixed;
      right: 26px;
      bottom: 26px;
      width: 72px;
      height: 72px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(145deg, #ffe28f, #ffb95b);
      box-shadow: 0 16px 28px rgba(219, 149, 46, 0.35);
      display: grid;
      place-items: center;
      cursor: pointer;
      z-index: 20;
      transition: transform 0.35s var(--spring), box-shadow 0.35s var(--spring);
    }

    .chat-launcher:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 20px 30px rgba(219, 149, 46, 0.44);
    }

    .chat-launcher svg {
      width: 36px;
      height: 36px;
    }

    .chat-window {
      position: fixed;
      right: 24px;
      bottom: 110px;
      width: min(420px, calc(100vw - 26px));
      height: min(660px, calc(100vh - 150px));
      background: linear-gradient(155deg, #fffefc, #f4faf4);
      border-radius: var(--radius-xl);
      border: 1px solid rgba(172, 196, 176, 0.35);
      box-shadow: 0 24px 45px rgba(61, 84, 69, 0.2);
      overflow: hidden;
      z-index: 30;
      opacity: 0;
      transform: translateY(20px) scale(0.92);
      pointer-events: none;
      transition: transform 0.45s var(--spring), opacity 0.45s var(--spring);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .chat-window.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .chat-head {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(177, 204, 181, 0.32);
      background: linear-gradient(130deg, #fff9ea, #eff8ef);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .chat-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sun-mini {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff7d7, var(--sun));
      box-shadow: 0 0 0 5px rgba(255, 197, 91, 0.16);
      position: relative;
      flex: 0 0 36px;
    }

    .sun-mini::before {
      content: "";
      position: absolute;
      inset: -9px;
      border-radius: 50%;
      border: 2px dashed rgba(249, 172, 64, 0.45);
      animation: spin 8s linear infinite;
    }

    .chat-head h3 {
      margin: 0;
      font-size: 0.98rem;
    }

    .chat-head p {
      margin: 0;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 700;
    }

    .close-chat {
      border: none;
      background: #ffffff;
      color: #5f7768;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 800;
      box-shadow: 0 4px 10px rgba(85, 102, 91, 0.18);
    }

    .chat-body {
      padding: 16px 14px 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: linear-gradient(180deg, #fffefb, #f4f8f5);
    }

    .msg {
      max-width: 85%;
      border-radius: 16px;
      padding: 11px 13px;
      line-height: 1.4;
      font-size: 0.95rem;
      animation: rise 0.35s var(--spring);
      box-shadow: 0 6px 16px rgba(65, 83, 73, 0.08);
    }

    .msg.ai {
      background: #ffffff;
      border: 1px solid rgba(177, 199, 182, 0.38);
      align-self: flex-start;
      border-top-left-radius: 7px;
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(150deg, #d3e9d7, #b9d8bf);
      color: #183b25;
      border-top-right-radius: 7px;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #86a690;
      animation: bounce 0.9s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.15s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.3s;
    }

    .chat-input {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid rgba(170, 196, 174, 0.3);
      background: #fff;
    }

    .quick-replies {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 12px 8px;
      background: #fff;
      border-top: 1px solid rgba(170, 196, 174, 0.15);
    }

    .chip {
      border: 1px solid rgba(151, 180, 158, 0.5);
      background: #f6fbf7;
      color: #365543;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .chip:hover {
      background: #eaf4ec;
      transform: translateY(-1px);
    }

    .chip.hidden {
      display: none;
    }

    .chat-input input {
      width: 100%;
      border: 1px solid rgba(166, 192, 171, 0.5);
      border-radius: 12px;
      padding: 11px 12px;
      font-family: inherit;
      font-size: 0.94rem;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .chat-input input:focus {
      border-color: #8fb293;
    }

    .send {
      border: 0;
      border-radius: 12px;
      width: 48px;
      background: linear-gradient(145deg, #f9cd6a, #f5ad59);
      color: #fff;
      font-size: 1.15rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(223, 153, 59, 0.34);
      transition: transform 0.18s var(--spring);
    }

    .send:active {
      transform: scale(0.93);
    }

    .confetti-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 14px;
      opacity: 0.9;
      animation: confettiDrop 1.6s ease-out forwards;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(16px);
      background: linear-gradient(135deg, #2f5a3f, #416b4f);
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(35, 71, 50, 0.28);
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      z-index: 70;
      transition: all 0.35s var(--spring);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    @keyframes rise {
      from { transform: translateY(8px) scale(0.98); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes pulseBadge {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.07); }
    }

    @keyframes confettiDrop {
      0% {
        transform: translateY(-30px) rotate(0deg);
        opacity: 0;
      }
      20% { opacity: 1; }
      100% {
        transform: translateY(110vh) rotate(750deg);
        opacity: 0;
      }
    }

    @media (max-width: 680px) {
      body {
        padding: 16px 12px 26px;
      }

      .hero {
        border-radius: 20px;
      }

      .toolbar-input,
      .toolbar-select {
        width: 100%;
        min-width: 0;
      }

      .chat-launcher {
        right: 16px;
        bottom: 16px;
        width: 64px;
        height: 64px;
      }

      .chat-window {
        right: 0;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 100vh;
        max-height: none;
        border-radius: 22px 22px 0 0;
        transform: translateY(30px) scale(1);
      }
    }
  </style>
</head>

  <script>
    const CENTRE_CONFIG = {
      centreName: "Sunshine Early Learning Centre",
      tagline: "Where little ones shine",
      assistantName: "Sunny",
      adminHeading: "New Enrolment Enquiries",
      locale: "en-AU",
      timezonePhoneLabel: "Australian",
      storagePrefix: "sunshine-centre",
      csvFilePrefix: "sunshine-enquiries",
      pdfTitle: "Enrolment Enquiries",
      expectedCallWindowHours: 2,
      pageSize: 6,
      quickReplies: {
        age: ["18 months", "2 years", "3 years"],
        days: ["Monday & Tuesday", "Monday to Friday", "Tuesday, Thursday"],

      },
      theme: {
        sun: "#ffcb61",
        sunDeep: "#f8a93a",

        consent: "Final step: Do you consent to us contacting you by phone/SMS about enrolment and tours? Please reply yes or no.",

      },

      },

      },

        privacyPolicyUrl: "https://example.com/privacy"

    const state = {
      step: 0,

    const STORAGE_KEY = `${CENTRE_CONFIG.storagePrefix}-leads-v1`;
    const ACTIVITY_STORAGE_KEY = `${CENTRE_CONFIG.storagePrefix}-activity-v1`;
    const SETTINGS_STORAGE_KEY = `${CENTRE_CONFIG.storagePrefix}-settings-v1`;
    const WEBHOOK_QUEUE_STORAGE_KEY = `${CENTRE_CONFIG.storagePrefix}-webhook-queue-v1`;

    function buildSteps() {
      return [
        `Hi there! I'm ${CENTRE_CONFIG.assistantName}, the AI assistant for ${CENTRE_CONFIG.centreName}. I'd love to help find the perfect care for your little one! ${CENTRE_CONFIG.conversation.age}`,

    const chatWindow = document.getElementById("chatWindow");

    const brandTagline = document.getElementById("brandTagline");

    const contactStrip = document.getElementById("contactStrip");
    const defaultLogo = document.getElementById("defaultLogo");

    const settingsForm = document.getElementById("settingsForm");
    const cfgCentreName = document.getElementById("cfgCentreName");
    const cfgTagline = document.getElementById("cfgTagline");
    const cfgAssistantName = document.getElementById("cfgAssistantName");
    const cfgContactPhone = document.getElementById("cfgContactPhone");
    const cfgContactEmail = document.getElementById("cfgContactEmail");
    const cfgContactAddress = document.getElementById("cfgContactAddress");
    const cfgWebhookUrl = document.getElementById("cfgWebhookUrl");
    const cfgPrivacyUrl = document.getElementById("cfgPrivacyUrl");
    const cfgLogoUrl = document.getElementById("cfgLogoUrl");
    const cfgLogoFile = document.getElementById("cfgLogoFile");
    const resetLogoBtn = document.getElementById("resetLogoBtn");

    const dayRegex = /\b(monday|mon|tuesday|tue|tues|wednesday|wed|thursday|thu|thur|thurs|friday|fri|saturday|sat|sunday|sun)\b/i;
    const ageRegex = /^\s*(\d{1,2})\s*(year|years|yr|yrs|month|months|mo|mths)\s*$/i;
    const childNameRegex = /^[A-Za-z]{2,}(?:\s[A-Za-z]+)*$/;
    const fullNameRegex = /^[A-Za-z]{2,}(?:\s[A-Za-z]{2,})+$/;
    const phoneRegex = CENTRE_CONFIG.validation.phoneRegex;
    const tourTimeRegex = /(?:mon|tue|wed|thu|fri|sat|sun|monday|tuesday|wednesday|thursday|friday|saturday|sunday|morning|afternoon|am|pm|\d{1,2}(:\d{2})?)/i;
    const startDateRegex = /(?:asap|immediately|next|month|week|term|from|\d{1,2}[\/\-\s]\d{1,2}(?:[\/\-\s]\d{2,4})?|\d{1,2}\s+[a-z]+)/i;
    const consentRegex = /^(yes|y|i consent|agree|confirmed)\b/i;
    const noConsentRegex = /^(no|n|decline|do not consent)\b/i;

    function applyBranding() {
      document.title = `${CENTRE_CONFIG.centreName} - AI Assistant`;
      brandName.textContent = CENTRE_CONFIG.centreName;
      brandTagline.textContent = CENTRE_CONFIG.tagline;

      document.documentElement.style.setProperty("--sun-deep", CENTRE_CONFIG.theme.sunDeep);
      document.documentElement.style.setProperty("--sage", CENTRE_CONFIG.theme.sage);
      document.documentElement.style.setProperty("--sage-strong", CENTRE_CONFIG.theme.sageStrong);

        customLogo.src = CENTRE_CONFIG.branding.logoUrl;

        defaultLogo.style.display = "block";

    function fillSettingsForm() {
      cfgCentreName.value = CENTRE_CONFIG.centreName;
      cfgTagline.value = CENTRE_CONFIG.tagline;
      cfgAssistantName.value = CENTRE_CONFIG.assistantName;
      cfgContactPhone.value = CENTRE_CONFIG.contact.phone;
      cfgContactEmail.value = CENTRE_CONFIG.contact.email;
      cfgContactAddress.value = CENTRE_CONFIG.contact.address;
      cfgWebhookUrl.value = CENTRE_CONFIG.automation.webhookUrl;
      cfgPrivacyUrl.value = CENTRE_CONFIG.automation.privacyPolicyUrl;
      cfgLogoUrl.value = CENTRE_CONFIG.branding.logoUrl;
    }

    function saveSettings() {
      const settingsPayload = {
        centreName: CENTRE_CONFIG.centreName,
        tagline: CENTRE_CONFIG.tagline,
        assistantName: CENTRE_CONFIG.assistantName,
        contact: CENTRE_CONFIG.contact,
        branding: CENTRE_CONFIG.branding,
        automation: CENTRE_CONFIG.automation
      };
      localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(settingsPayload));
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return;
        CENTRE_CONFIG.centreName = parsed.centreName || CENTRE_CONFIG.centreName;
        CENTRE_CONFIG.tagline = parsed.tagline || CENTRE_CONFIG.tagline;
        CENTRE_CONFIG.assistantName = parsed.assistantName || CENTRE_CONFIG.assistantName;
        CENTRE_CONFIG.contact.phone = parsed.contact?.phone || CENTRE_CONFIG.contact.phone;
        CENTRE_CONFIG.contact.email = parsed.contact?.email || CENTRE_CONFIG.contact.email;
        CENTRE_CONFIG.contact.address = parsed.contact?.address || CENTRE_CONFIG.contact.address;
        CENTRE_CONFIG.branding.logoUrl = parsed.branding?.logoUrl || CENTRE_CONFIG.branding.logoUrl;
        CENTRE_CONFIG.automation.webhookUrl = parsed.automation?.webhookUrl || CENTRE_CONFIG.automation.webhookUrl;
        CENTRE_CONFIG.automation.privacyPolicyUrl = parsed.automation?.privacyPolicyUrl || CENTRE_CONFIG.automation.privacyPolicyUrl;
      } catch (_error) {
        /* no-op on bad saved settings */
      }
    }

    function getWebhookQueue() {
      try {
        const raw = localStorage.getItem(WEBHOOK_QUEUE_STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (_error) {
        return [];
      }
    }

    function saveWebhookQueue(queue) {
      localStorage.setItem(WEBHOOK_QUEUE_STORAGE_KEY, JSON.stringify(queue));
    }

    function scoreLead(lead) {
      let score = 50;
      if (lead.careType === "full time") score += 15;
      if (/monday|tuesday|wednesday|thursday|friday/i.test(lead.daysNeeded)) score += 10;
      if (/asap|immediately/i.test(lead.preferredStartDate)) score += 15;
      if (/\d{1,2}(:\d{2})?\s?(am|pm)/i.test(lead.preferredTourTime)) score += 8;
      if (lead.childAge && /month|1 year|2 year/i.test(lead.childAge)) score += 5;
      const bounded = Math.max(0, Math.min(100, score));
      const priority = bounded >= 80 ? "Hot" : bounded >= 65 ? "Warm" : "Nurture";
      return { score: bounded, priority };
    }

    function scheduleWebhook(lead) {
      if (!CENTRE_CONFIG.automation.webhookUrl) return;
      const queue = getWebhookQueue();
      queue.push({
        leadId: lead.leadId,
        attempts: 0,
        nextAttemptAt: Date.now(),
        payload: lead
      });
      saveWebhookQueue(queue);
    }

    async function flushWebhookQueue() {
      if (!CENTRE_CONFIG.automation.webhookUrl) return;
      const queue = getWebhookQueue();
      if (!queue.length) return;
      const now = Date.now();
      const updatedQueue = [];

      for (const item of queue) {
        if (item.nextAttemptAt > now) {
          updatedQueue.push(item);
          continue;
        }
        try {
          const response = await fetch(CENTRE_CONFIG.automation.webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(item.payload)
          });
          if (!response.ok) throw new Error("Webhook failed");
          const lead = state.leads.find((entry) => entry.leadId === item.leadId);
          if (lead) lead.webhookStatus = "Sent";
          logActivity("Webhook", `Lead ${item.payload.childName} sent to webhook.`);
        } catch (_error) {
          item.attempts += 1;
          if (item.attempts < 5) {
            item.nextAttemptAt = now + item.attempts * 30000;
            updatedQueue.push(item);
          } else {
            const lead = state.leads.find((entry) => entry.leadId === item.leadId);
            if (lead) lead.webhookStatus = "Failed";
            logActivity("Webhook", `Lead ${item.payload.childName} failed after retries.`);
          }
        }
      }
      saveWebhookQueue(updatedQueue);
      saveLeads();
      renderLeads();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function beep(duration = 0.07, frequency = 720, type = "sine", volume = 0.03) {
      if (!state.soundEnabled || !window.AudioContext) return;
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = frequency;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration);
      osc.onended = () => ctx.close();
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1600);
    }

    function addMessage(text, from = "ai") {
      const msg = document.createElement("div");
      msg.className = `msg ${from}`;
      msg.textContent = text;
      chatBody.appendChild(msg);
      chatBody.scrollTop = chatBody.scrollHeight;
      if (from === "ai") beep(0.05, 640, "sine", 0.02);
      if (from === "user") beep(0.04, 820, "triangle", 0.02);
    }

    function showTyping() {
      const wrap = document.createElement("div");
      wrap.className = "msg ai";
      wrap.id = "typing";
      wrap.innerHTML = '<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
      chatBody.appendChild(wrap);
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function hideTyping() {
      const typing = document.getElementById("typing");
      if (typing) typing.remove();
    }

    function aiSpeak(text, delay = 650) {
      state.isTyping = true;
      chatInput.disabled = true;
      showTyping();
      setTimeout(() => {
        hideTyping();
        addMessage(text, "ai");
        state.isTyping = false;
        chatInput.disabled = false;
        chatInput.focus();
        renderQuickReplies();
      }, delay);
    }

    function formatPhone(phoneRaw) {
      return phoneRaw.replace(/[^\d+]/g, "");
    }

    function validateByStep(input) {
      const value = input.trim();

      if (state.step === 0) {
        if (!ageRegex.test(value)) {
          return { valid: false, error: "Please enter a valid age like '2 years' or '18 months'." };
        }
        state.currentLead.childAge = value;
        return { valid: true };
      }

      if (state.step === 1) {
        if (!dayRegex.test(value)) {
          return { valid: false, error: "Please include at least one day of the week (for example: Monday, Wednesday)." };
        }
        state.currentLead.daysNeeded = value;
        return { valid: true };
      }

      if (state.step === 2) {
        const normal = value.toLowerCase();
        if (normal !== "full time" && normal !== "part time") {
          return { valid: false, error: "Please answer with exactly 'full time' or 'part time'." };
        }
        state.currentLead.careType = normal;
        return { valid: true };
      }

      if (state.step === 3) {
        if (!childNameRegex.test(value)) {
          return { valid: false, error: "Please provide your child's name using letters only (minimum 2 characters)." };
        }
        state.currentLead.childName = value;
        return { valid: true };
      }

      if (state.step === 4) {
        if (!fullNameRegex.test(value)) {
          return { valid: false, error: "Please enter your full name (first and last name)." };
        }
        state.currentLead.parentName = value;
        return { valid: true };
      }

      if (state.step === 5) {
        const phoneMatch = value.match(phoneRegex);
        if (!phoneMatch) {
          return { valid: false, error: `Please enter a valid ${CENTRE_CONFIG.timezonePhoneLabel} phone number.` };
        }
        state.currentLead.phone = formatPhone(phoneMatch[0]);
        return { valid: true };
      }

      if (state.step === 6) {
        if (!tourTimeRegex.test(value) || value.length < 4) {
          return { valid: false, error: "Please share a preferred tour time like 'Tuesday 10am' or 'weekday afternoons'." };
        }
        state.currentLead.preferredTourTime = value;
        return { valid: true };
      }

      if (state.step === 7) {
        if (!startDateRegex.test(value) || value.length < 3) {
          return { valid: false, error: "Please share when you'd like care to begin (for example: ASAP, next month, or 15 June)." };
        }
        state.currentLead.preferredStartDate = value;
        return { valid: true };
      }

      if (state.step === 8) {
        if (noConsentRegex.test(value)) {
          return { valid: false, error: `We need your consent to contact you before submitting. You can review our privacy policy here: ${CENTRE_CONFIG.automation.privacyPolicyUrl}` };
        }
        if (!consentRegex.test(value)) {
          return { valid: false, error: "Please reply 'yes' to provide consent and continue." };
        }
        state.currentLead.consentGiven = true;
        return { valid: true };
      }

      return { valid: false, error: "Something went wrong. Please try again." };
    }

    function resetConversation() {
      state.step = 0;
      state.currentLead = {
        childAge: "",
        daysNeeded: "",
        careType: "",
        childName: "",
        parentName: "",
        phone: "",
        preferredTourTime: "",
        preferredStartDate: "",
        consentGiven: false,
        leadScore: 0,
        priority: "Warm",
        webhookStatus: "Not sent",
        leadId: ""
      };
      const steps = buildSteps();
      aiSpeak(steps[0], 500);
    }

    function saveLeads() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.leads));
    }

    function saveActivity() {
      localStorage.setItem(ACTIVITY_STORAGE_KEY, JSON.stringify(state.activity));
    }

    function loadLeads() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          state.leads = parsed.map((lead) => ({
            ...lead,
            timestampISO: lead.timestampISO || new Date().toISOString(),
            preferredTourTime: lead.preferredTourTime || "",
            preferredStartDate: lead.preferredStartDate || "",
            consentGiven: Boolean(lead.consentGiven),
            leadScore: Number(lead.leadScore || 0),
            priority: lead.priority || "Warm",
            webhookStatus: lead.webhookStatus || "Not sent",
            leadId: lead.leadId || `lead-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`
          }));
        }
      } catch (_error) {
        state.leads = [];
      }
    }

    function loadActivity() {
      try {
        const raw = localStorage.getItem(ACTIVITY_STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) state.activity = parsed;
      } catch (_error) {
        state.activity = [];
      }
    }

    function logActivity(type, message) {
      state.activity.unshift({
        type,
        message,
        at: new Date().toLocaleString(CENTRE_CONFIG.locale, { dateStyle: "medium", timeStyle: "short" })
      });
      if (state.activity.length > 120) {
        state.activity = state.activity.slice(0, 120);
      }
      saveActivity();
      renderTimeline();
    }

    function renderTimeline() {
      timelineList.innerHTML = "";
      if (!state.activity.length) {
        timelineList.innerHTML = '<div class="empty-state">No activity yet.</div>';
        return;
      }
      state.activity.slice(0, 12).forEach((entry) => {
        const item = document.createElement("div");
        item.className = "timeline-item";
        item.innerHTML = `<b>${escapeHtml(entry.type)}:</b> ${escapeHtml(entry.message)}<br /><span>${escapeHtml(entry.at)}</span>`;
        timelineList.appendChild(item);
      });
    }

    function addLead() {
      const lead = {
        ...state.currentLead,
        leadId: `lead-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        timestamp: new Date().toLocaleString(CENTRE_CONFIG.locale, { dateStyle: "medium", timeStyle: "short" }),
        timestampISO: new Date().toISOString()
      };
      const scored = scoreLead(lead);
      lead.leadScore = scored.score;
      lead.priority = scored.priority;
      lead.webhookStatus = CENTRE_CONFIG.automation.webhookUrl ? "Queued" : "Not configured";
      state.leads.unshift(lead);
      saveLeads();
      logActivity("Captured", `${lead.childName} enquiry submitted (${lead.careType}).`);
      scheduleWebhook(lead);
      flushWebhookQueue();
      renderLeads();
      triggerConfetti();
      beep(0.1, 520, "triangle", 0.05);
    }

    function getVisibleLeads() {
      const term = state.searchTerm.trim().toLowerCase();
      let filtered = [...state.leads];
      if (term) {
        filtered = filtered.filter((lead) => {
          const combined = [
            lead.childName,
            lead.childAge,
            lead.daysNeeded,
            lead.careType,
            lead.parentName,
            lead.phone,
            lead.preferredTourTime,
            lead.preferredStartDate,
            lead.priority,
            lead.leadScore,
            lead.webhookStatus,
            lead.timestamp
          ].join(" ").toLowerCase();
          return combined.includes(term);
        });
      }

      if (state.sortMode === "oldest") {
        filtered.sort((a, b) => new Date(a.timestampISO || 0) - new Date(b.timestampISO || 0));
      } else if (state.sortMode === "childAZ") {
        filtered.sort((a, b) => a.childName.localeCompare(b.childName));
      } else if (state.sortMode === "childZA") {
        filtered.sort((a, b) => b.childName.localeCompare(a.childName));
      } else {
        filtered.sort((a, b) => new Date(b.timestampISO || 0) - new Date(a.timestampISO || 0));
      }
      return filtered;
    }

    function renderLeads() {
      leadCount.textContent = String(state.leads.length);
      leadsGrid.innerHTML = "";
      pagination.innerHTML = "";

      const visibleLeads = getVisibleLeads();
      const totalVisible = visibleLeads.length;
      const totalPages = Math.max(1, Math.ceil(totalVisible / state.pageSize));
      if (state.currentPage > totalPages) state.currentPage = totalPages;
      if (state.currentPage < 1) state.currentPage = 1;
      const start = (state.currentPage - 1) * state.pageSize;
      const pagedLeads = visibleLeads.slice(start, start + state.pageSize);
      toolbarMeta.textContent = `Showing ${totalVisible ? start + 1 : 0}-${Math.min(start + state.pageSize, totalVisible)} of ${totalVisible}`;

      if (!state.leads.length) {
        leadsGrid.innerHTML = '<div class="empty-state">No enquiries yet. Leads captured in chat appear here instantly.</div>';
        toolbarMeta.textContent = "Showing 0 of 0";
        return;
      }

      if (!visibleLeads.length) {
        leadsGrid.innerHTML = '<div class="empty-state">No leads match your current search.</div>';
        toolbarMeta.textContent = "Showing 0 of 0";
        return;
      }

      const latestLeadKey = state.leads.reduce((latest, lead) => {
        if (!latest) return lead.leadId;
        return new Date(lead.timestampISO) > new Date((state.leads.find((x) => x.leadId === latest) || {}).timestampISO || 0) ? lead.leadId : latest;
      }, "");

      pagedLeads.forEach((lead) => {
        const sourceIndex = state.leads.findIndex((item) => item.leadId === lead.leadId);
        const card = document.createElement("article");
        card.className = "lead-card";
        card.dataset.index = String(sourceIndex);
        const leadKey = lead.leadId;
        card.innerHTML = `
          ${leadKey === latestLeadKey ? '<div class="badge">New Enrolment Enquiry</div>' : ""}
          <h3>${escapeHtml(lead.childName)}</h3>
          <div class="lead-row"><b>Age:</b> ${escapeHtml(lead.childAge)}</div>
          <div class="lead-row"><b>Days:</b> ${escapeHtml(lead.daysNeeded)}</div>
          <div class="lead-row"><b>Care Type:</b> ${escapeHtml(lead.careType)}</div>
          <div class="lead-row"><b>Parent:</b> ${escapeHtml(lead.parentName)}</div>
          <div class="lead-row"><b>Phone:</b> ${escapeHtml(lead.phone)}</div>
          <div class="lead-row"><b>Preferred Tour:</b> ${escapeHtml(lead.preferredTourTime || "Not provided")}</div>
          <div class="lead-row"><b>Preferred Start:</b> ${escapeHtml(lead.preferredStartDate || "Not provided")}</div>
          <div class="lead-row"><b>Consent:</b> ${lead.consentGiven ? "Yes" : "No"}</div>
          <div class="lead-row"><b>Priority:</b> ${escapeHtml(lead.priority || "Warm")} (${escapeHtml(String(lead.leadScore ?? 0))})</div>
          <div class="lead-row"><b>Webhook:</b> ${escapeHtml(lead.webhookStatus || "Not sent")}</div>
          <div class="lead-row"><b>Received:</b> ${escapeHtml(lead.timestamp)}</div>
          <div class="lead-actions">
            <button type="button" class="lead-btn edit" data-action="edit">Edit</button>
            <button type="button" class="lead-btn delete" data-action="delete">Delete</button>
          </div>
        `;
        leadsGrid.appendChild(card);
      });

      if (totalPages > 1) {
        pagination.innerHTML = `
          <button type="button" class="lead-btn" data-page-action="prev">Previous</button>
          <div class="page-text">Page ${state.currentPage} of ${totalPages}</div>
          <button type="button" class="lead-btn" data-page-action="next">Next</button>
        `;
      }
    }

    function clearLeads() {
      if (!state.leads.length) {
        showToast("No leads to clear yet.");
        return;
      }
      const confirmClear = window.confirm("Clear all captured leads?");
      if (!confirmClear) return;
      state.leads = [];
      saveLeads();
      logActivity("Bulk Clear", "All leads were removed from the dashboard.");
      renderLeads();
      showToast("All leads cleared.");
    }

    function triggerConfetti() {
      const colors = CENTRE_CONFIG.theme.confetti;
      for (let i = 0; i < 120; i += 1) {
        const piece = document.createElement("span");
        piece.className = "confetti";
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.transform = `translateY(-30px) rotate(${Math.random() * 360}deg)`;
        piece.style.width = `${7 + Math.random() * 8}px`;
        piece.style.height = `${10 + Math.random() * 10}px`;
        piece.style.animationDelay = `${Math.random() * 0.4}s`;
        confettiLayer.appendChild(piece);
      }
      setTimeout(() => {
        confettiLayer.innerHTML = "";
      }, 1900);
    }

    function exportCSV() {
      if (!state.leads.length) {
        alert("No leads to export yet.");
        return;
      }

      const headers = ["Child Name", "Age", "Days Needed", "Care Type", "Parent Name", "Phone Number", "Preferred Tour Time", "Preferred Start Date", "Consent", "Priority", "Lead Score", "Webhook Status", "Timestamp"];
      const rows = state.leads.map((lead) => [
        lead.childName,
        lead.childAge,
        lead.daysNeeded,
        lead.careType,
        lead.parentName,
        lead.phone,
        lead.preferredTourTime,
        lead.preferredStartDate,
        lead.consentGiven ? "Yes" : "No",
        lead.priority,
        lead.leadScore,
        lead.webhookStatus,
        lead.timestamp
      ]);

      const esc = (value) => `"${String(value).replace(/"/g, '""')}"`;
      const csv = [headers.map(esc).join(","), ...rows.map((r) => r.map(esc).join(","))].join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `${CENTRE_CONFIG.csvFilePrefix}-${Date.now()}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function saveEditedLead(card, index) {
      const childName = card.querySelector('input[name="childName"]').value.trim();
      const childAge = card.querySelector('input[name="childAge"]').value.trim();
      const daysNeeded = card.querySelector('input[name="daysNeeded"]').value.trim();
      const careType = card.querySelector('input[name="careType"]').value.trim().toLowerCase();
      const parentName = card.querySelector('input[name="parentName"]').value.trim();
      const phoneRaw = card.querySelector('input[name="phone"]').value.trim();
      const preferredTourTime = card.querySelector('input[name="preferredTourTime"]').value.trim();
      const preferredStartDate = card.querySelector('input[name="preferredStartDate"]').value.trim();

      if (!childNameRegex.test(childName)) return showToast("Please enter a valid child name.");
      if (!ageRegex.test(childAge)) return showToast("Please enter a valid age.");
      if (!dayRegex.test(daysNeeded)) return showToast("Please include at least one day.");
      if (careType !== "full time" && careType !== "part time") return showToast("Care type must be full time or part time.");
      if (!fullNameRegex.test(parentName)) return showToast("Please enter a valid full parent name.");
      if (!phoneRegex.test(phoneRaw)) return showToast(`Please enter a valid ${CENTRE_CONFIG.timezonePhoneLabel} phone number.`);
      if (!tourTimeRegex.test(preferredTourTime)) return showToast("Please enter a valid preferred tour time.");
      if (!startDateRegex.test(preferredStartDate)) return showToast("Please enter a valid preferred start date.");
      const scored = scoreLead({
        childAge,
        daysNeeded,
        careType,
        preferredTourTime,
        preferredStartDate
      });

      state.leads[index] = {
        ...state.leads[index],
        childName,
        childAge,
        daysNeeded,
        careType,
        parentName,
        phone: formatPhone(phoneRaw),
        preferredTourTime,
        preferredStartDate,
        leadScore: scored.score,
        priority: scored.priority
      };
      saveLeads();
      logActivity("Edited", `${childName} lead details were updated.`);
      renderLeads();
      showToast("Lead updated.");
    }

    function getQuickRepliesForStep(step) {
      if (step === 0) return CENTRE_CONFIG.quickReplies.age;
      if (step === 1) return CENTRE_CONFIG.quickReplies.days;
      if (step === 2) return CENTRE_CONFIG.quickReplies.careType;
      if (step === 6) return ["Tuesday 10am", "Weekday afternoons", "Friday 3:30pm"];
      if (step === 7) return ["ASAP", "Next month", "From next term"];
      if (step === 8) return ["Yes, I consent"];
      return [];
    }

    function renderQuickReplies() {
      quickReplies.innerHTML = "";
      const choices = getQuickRepliesForStep(state.step);
      if (!choices.length || state.isTyping) {
        quickReplies.classList.add("hidden");
        return;
      }
      quickReplies.classList.remove("hidden");
      choices.forEach((label) => {
        const chip = document.createElement("button");
        chip.className = "chip";
        chip.type = "button";
        chip.textContent = label;
        chip.addEventListener("click", () => {
          chatInput.value = label;
          chatForm.requestSubmit();
        });
        quickReplies.appendChild(chip);
      });
    }

    openChat.addEventListener("click", () => {
      chatWindow.classList.add("open");
      openChat.style.transform = "scale(0.85)";
      setTimeout(() => {
        openChat.style.transform = "";
      }, 220);
      chatInput.focus();
    });

    closeChat.addEventListener("click", () => {
      chatWindow.classList.remove("open");
    });

    chatForm.addEventListener("submit", (event) => {
      event.preventDefault();
      if (state.isTyping) return;
      const steps = buildSteps();
      const input = chatInput.value.trim();
      if (!input) return;

      addMessage(input, "user");
      chatInput.value = "";

      const check = validateByStep(input);
      if (!check.valid) {
        aiSpeak(check.error, 520);
        return;
      }

      state.step += 1;

      if (state.step < steps.length) {
        aiSpeak(steps[state.step], 650);
      } else {
        addLead();
        aiSpeak(CENTRE_CONFIG.conversation.success.replace("{callWindow}", String(CENTRE_CONFIG.expectedCallWindowHours)), 650);
        setTimeout(() => {
          resetConversation();
        }, 2200);
      }
    });

    exportBtn.addEventListener("click", exportCSV);
    pdfBtn.addEventListener("click", exportPDF);
    clearBtn.addEventListener("click", clearLeads);
    soundBtn.addEventListener("click", () => {
      state.soundEnabled = !state.soundEnabled;
      soundBtn.textContent = `Sound: ${state.soundEnabled ? "On" : "Off"}`;
      showToast(state.soundEnabled ? "Sound enabled." : "Sound muted.");
    });
    retryWebhookBtn.addEventListener("click", () => {
      flushWebhookQueue();
      showToast("Retrying queued webhook deliveries...");
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") chatWindow.classList.remove("open");
    });
    searchInput.addEventListener("input", (event) => {
      state.searchTerm = event.target.value;
      state.currentPage = 1;
      renderLeads();
    });
    sortSelect.addEventListener("change", (event) => {
      state.sortMode = event.target.value;
      state.currentPage = 1;
      renderLeads();
    });
    pagination.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      const action = target.dataset.pageAction;
      if (!action) return;
      const total = getVisibleLeads().length;
      const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
      if (action === "prev" && state.currentPage > 1) state.currentPage -= 1;
      if (action === "next" && state.currentPage < totalPages) state.currentPage += 1;
      renderLeads();
    });
    leadsGrid.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      const action = target.dataset.action;
      if (!action) return;

      const card = target.closest(".lead-card");
      if (!card) return;
      const index = Number(card.dataset.index);
      if (!Number.isInteger(index) || index < 0 || !state.leads[index]) return;

      if (action === "delete") {
        const confirmed = window.confirm("Delete this lead?");
        if (!confirmed) return;
        const deletedName = state.leads[index].childName;
        state.leads.splice(index, 1);
        saveLeads();
        logActivity("Deleted", `${deletedName} lead was deleted.`);
        renderLeads();
        showToast("Lead deleted.");
      } else if (action === "edit") {
        openEditCard(card, state.leads[index], index);
      } else if (action === "cancel") {
        renderLeads();
      } else if (action === "save") {
        saveEditedLead(card, index);
      }
    });

    settingsForm.addEventListener("submit", (event) => {
      event.preventDefault();
      CENTRE_CONFIG.centreName = cfgCentreName.value.trim() || CENTRE_CONFIG.centreName;
      CENTRE_CONFIG.tagline = cfgTagline.value.trim() || CENTRE_CONFIG.tagline;
      CENTRE_CONFIG.assistantName = cfgAssistantName.value.trim() || CENTRE_CONFIG.assistantName;
      CENTRE_CONFIG.contact.phone = cfgContactPhone.value.trim() || CENTRE_CONFIG.contact.phone;
      CENTRE_CONFIG.contact.email = cfgContactEmail.value.trim() || CENTRE_CONFIG.contact.email;
      CENTRE_CONFIG.contact.address = cfgContactAddress.value.trim() || CENTRE_CONFIG.contact.address;
      CENTRE_CONFIG.automation.webhookUrl = cfgWebhookUrl.value.trim();
      CENTRE_CONFIG.automation.privacyPolicyUrl = cfgPrivacyUrl.value.trim() || CENTRE_CONFIG.automation.privacyPolicyUrl;
      CENTRE_CONFIG.branding.logoUrl = cfgLogoUrl.value.trim();
      saveSettings();
      applyBranding();
      showToast("Settings saved.");
    });

    cfgLogoFile.addEventListener("change", () => {
      const file = cfgLogoFile.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const result = typeof reader.result === "string" ? reader.result : "";
        if (!result) return;
        CENTRE_CONFIG.branding.logoUrl = result;
        cfgLogoUrl.value = result;
        saveSettings();
        applyBranding();
        showToast("Logo uploaded.");
      };
      reader.readAsDataURL(file);
    });

    resetLogoBtn.addEventListener("click", () => {
      CENTRE_CONFIG.branding.logoUrl = "";
      cfgLogoUrl.value = "";
      cfgLogoFile.value = "";
      saveSettings();
      applyBranding();
      showToast("Logo reset to default.");
    });

    loadSettings();
    applyBranding();
    fillSettingsForm();
    loadLeads();
    loadActivity();
    addMessage(buildSteps()[0], "ai");
    renderLeads();
    renderTimeline();
    renderQuickReplies();
    setInterval(() => {
      flushWebhookQueue();
    }, 45000);
  </script>
</body>
</html>
